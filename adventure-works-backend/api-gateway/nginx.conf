events {
    worker_connections 1024;
}

http {
    upstream postgres_service {
        server postgres:5432;
    }

    upstream sqlserver_service {
        server sqlserver:1433;
    }

    upstream mysql_service {
        server mysql:3306;
    }

    upstream mongodb_service {
        server mongodb:27017;
    }

    server {
        listen 8080;
        server_name localhost;

        # Health check endpoint
        location /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # Default route
        location / {
            return 200 '{"message":"AdventureWorks API Gateway","version":"1.0.0"}';
            add_header Content-Type application/json;
        }
    }
}
