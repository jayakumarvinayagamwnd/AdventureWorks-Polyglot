version: "3.9"
name: adventure-works-polyglot

services:
  # PostgreSQL
  postgres:
    image: postgres:16
    container_name: aw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aw_network

  # SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aw_sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "${MSSQL_PORT}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - aw_network

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: aw_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - aw_network

  # MongoDB
  mongodb:
    image: mongo:4.4
    container_name: aw_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - aw_network

  # API Gateway
  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    container_name: aw_api_gateway
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${API_GATEWAY_PORT}:8080"
    depends_on:
      - postgres
      - sqlserver
      - mysql
      - mongodb
    networks:
      - aw_network

  # Monitoring (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    container_name: aw_prometheus
    restart: unless-stopped
    ports:
      - "${MONITORING_PORT}:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aw_network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: aw_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - aw_network

volumes:
  postgres_data:
  sqlserver_data:
  mysql_data:
  mongo_data:
  prometheus_data:
  grafana_data:

networks:
  aw_network:
    driver: bridge
